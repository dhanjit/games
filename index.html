<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0613" />
  <title>dhanjit.me — games</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%2064%2064'%3E%3Crect%20width='64'%20height='64'%20rx='14'%20fill='%230b0613'/%3E%3Ctext%20x='32'%20y='46'%20font-size='38'%20text-anchor='middle'%20fill='%23f5c97a'%3E%E0%A4%85%3C/text%3E%3C/svg%3E" />
  <style>
    :root {
      --bg: #0b0613;
      --bg-2: #150d24;
      --ink: #ece6f5;
      --muted: #9b8fb5;
      --gold: #f5c97a;
      --line: rgba(245, 201, 122, 0.18);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background:
        radial-gradient(1200px 600px at 50% -10%, #1d1233 0%, transparent 60%),
        var(--bg);
      color: var(--ink);
      font-family: "Hoefler Text", Georgia, "Times New Roman", serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: max(48px, env(safe-area-inset-top)) 20px 64px;
      min-height: 100vh;
    }
    header { text-align: center; margin-bottom: 40px; }
    .mark { font-size: 44px; color: var(--gold); line-height: 1; }
    h1 {
      font-size: clamp(28px, 7vw, 44px);
      margin: 14px 0 6px;
      letter-spacing: 0.02em;
    }
    .sub { color: var(--muted); font-size: 15px; font-style: italic; margin: 0; }
    .grid {
      width: 100%;
      max-width: 640px;
      display: grid;
      gap: 16px;
    }
    .game {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, var(--bg-2), rgba(21,13,36,0.4));
      color: inherit;
      text-decoration: none;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }
    .game:hover {
      transform: translateY(-3px);
      border-color: rgba(245, 201, 122, 0.5);
      box-shadow: 0 12px 30px rgba(0,0,0,0.45);
    }
    .game .art {
      font-size: 40px;
      width: 56px;
      text-align: center;
      flex: none;
    }
    .game .body { min-width: 0; }
    .game .name { font-size: 20px; margin: 0 0 4px; }
    .game .desc { color: var(--muted); font-size: 14px; margin: 0; line-height: 1.4; }
    .game .go { margin-left: auto; color: var(--gold); font-size: 22px; flex: none; }
    footer { color: var(--muted); font-size: 13px; margin-top: 48px; text-align: center; }
    footer a { color: var(--gold); text-decoration: none; }
  </style>
</head>
<body>
  <header>
    <div class="mark">ॐ</div>
    <h1>Games</h1>
    <p class="sub">Small web games. No installs — just tap and play.</p>
  </header>

  <main class="grid">
    <a class="game" href="./saptaloka/">
      <div class="art">🪷</div>
      <div class="body">
        <p class="name">Saptaloka</p>
        <p class="desc">A Reigns-style mythology rogue-like. Swipe your dharma through the seven worlds toward mokṣa.</p>
      </div>
      <div class="go" aria-hidden="true">→</div>
    </a>

    <a class="game" href="./runner/">
      <div class="art">🏃</div>
      <div class="body">
        <p class="name">Runner</p>
        <p class="desc">A stick-figure endless runner. Jump, slide, and don't stop — the world only gets faster.</p>
      </div>
      <div class="go" aria-hidden="true">→</div>
    </a>
  </main>

  <footer>
    by <a href="https://dhanjit.me">dhanjit.me</a>
  </footer>
</body>
</html>
